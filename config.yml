baseURL: "https://nimgroup.github.io/"
title: NIMG
theme: PaperMod

enableInlineShortcodes: true
enableRobotsTXT: true
pagination:
  pagerSize: 20

taxonomies:
    tag: tags

menu:
    main:
        - name: About
          url: about/
          weight: 1
        - name: Research
          url: research/
          weight: 2
        - name: Publication
          url: publication/
          weight: 3
        - name: Teaching
          url: teaching/
          weight: 4
        - name: Source
          url: source/
          weight: 5
        - name: News
          url: news/
          weight: 6
        - name: Member
          url: members/
          weight: 7
        - name: Contact
          url: contact/
          weight: 8

params:
    description: "NIM Group — Official website of the NIM research laboratory."
    author: NIM Group
    DateFormat: "January 2006"
    defaultTheme: light
    hideFooter: false
    disableThemeToggle: true
    ShowShareButtons: false
    ShowReadingTime: false
    disableSpecial1stPost: true
    disableAnchoredHeadings: true
    ShowPostNavLinks: false
    ShowBreadCrumbs: false
    ShowCodeCopyButtons: true
    ShowAllPagesInArchive: false
    MainSections: ["research","publication","teaching","source","news"]
    ShowToc: false
    disableScrollToTop: true
    TocOpen: true
    ShowWordCount: false
    UseHugoToc: true
    comments: false
    math: true
    profileMode:
          enabled: true
          title: NIM Group
          subtitle: "Welcome to the NIM Group. We are a research laboratory focused on [your research area]. Our work spans [topics]. We are based at [University / Institution]."
          imageUrl: "picture.jpeg"
          imageWidth: 160
          imageHeight: 160
          buttons:
            - name: Research
              url: research/
            - name: Publication
              url: publication/
            - name: Member
              url: members/
            - name: News
              url: news/
            - name: Contact
              url: contact/

    socialIcons:
        - name: CV
          url: cv.pdf
        - name: Email
          url: mailto:nim@university.edu
        - name: Google Scholar
          url: https://scholar.google.com/
        - name: GitHub
          url: https://github.com/nimgroup

    assets:
        disableScrollBarStyle: true
    cover:
        hiddenInList: false
        hiddenInSingle: true
    label:
      text: "NIM Group"
      icon: favicon.ico
      iconHeight: 18

markup:
    goldmark:
        renderer:
            unsafe: true
    highlight:
        guessSyntax: true
        style: autumn
    tableOfContents:
        endLevel: 2
        ordered: false
        startLevel: 2
