- name: "NIM-BCI"
  description: "A PyTorch-based open-source toolbox for EEG-based brain-computer interface research, covering signal preprocessing, feature extraction, neural decoding, and closed-loop experiment control. Includes reference implementations for SSVEP, P300, and motor imagery paradigms."
  type: "Software"
  stack: "Python / PyTorch"
  github: "https://github.com/nimgroup/nim-bci"
  paper: "10.1109/TNSRE.2024.3401872"
  status: "Active"

- name: "FedMedSeg"
  description: "Federated learning framework for heterogeneous multi-site medical image segmentation. Handles non-IID scanner protocols and label distributions across institutions without sharing raw patient data. Achieves <2% Dice gap vs. centralized training on brain tumor benchmarks."
  type: "Software"
  stack: "Python / PyTorch / Flower"
  github: "https://github.com/nimgroup/fedmedseg"
  paper: "10.1038/s41467-024-48291-0"
  status: "Active"

- name: "NIMNav"
  description: "Real-time brain shift compensation library for intraoperative neuronavigation. Fuses intraoperative ultrasound with preoperative MRI via a deformable registration network, achieving sub-millimeter target registration error (<0.71 mm) on clinical neurosurgical cases."
  type: "Software"
  stack: "Python / C++ / SimpleITK"
  github: "https://github.com/nimgroup/nimnav"
  paper: "10.1016/j.media.2024.103142"
  status: "Active"

- name: "NIMPath"
  description: "Reinforcement learning environment for patient-specific neurosurgical path planning. Generates simulation scenes from segmented MRI/CT volumes and trains trajectory policies that avoid critical vascular and eloquent cortex structures. Compatible with OpenAI Gym API."
  type: "Software"
  stack: "Python / Gymnasium / VTK"
  github: "https://github.com/nimgroup/nimpath"
  paper: "10.1007/978-3-031-16449-1_38"
  status: "Active"

- name: "THINGS-NIM-EEG"
  description: "Large-scale EEG dataset for image-concept decoding research. Contains 64-channel EEG recordings from 20 healthy participants viewing 10,000 object images drawn from the THINGS concept database. Includes preprocessed epochs, ICA components, and CLIP semantic embeddings."
  type: "Dataset"
  stack: "MATLAB / Python"
  github: "https://github.com/nimgroup/things-nim-eeg"
  paper: ""
  status: "Active"
