# Photos Gallery Data
# ──────────────────────────────────────────────────────────────────────────────
# Each top-level entry is a category (e.g. "Group Activities", "Conferences").
# Photos within each category support the following fields:
#
#   file     – path relative to /static/, e.g. /photos/activities/photo.jpg
#   alt      – screen-reader alternative text (required)
#   caption  – optional visible caption shown on hover
#   size     – layout hint (optional, defaults to "normal"):
#                normal  →  1 column × 1 row
#                wide    →  2 columns × 1 row
#                tall    →  1 column × 2 rows
#                large   →  2 columns × 2 rows
# ──────────────────────────────────────────────────────────────────────────────

